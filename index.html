*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}

.stat-chip.men{background:#ede9fe;color:#5b21b6;}
.stat-chip.done{background:#dcfce7;color:#166534;}

.btn-add{margin:6px 8px 8px;padding:6px 10px;border:1px dashed #cbd5e1;background:transparent;color:var(--muted);font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;text-align:left;transition:all 0.15s;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-add:hover{border-color:var(--hoy);color:var(--hoy);background:#eff6ff;}
.card{background:white;border-radius:8px;padding:10px 10px 8px;border:1px solid var(--border);cursor:pointer;transition:box-shadow 0.15s;position:relative;}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.card.imp-card{border-left:3px solid #dc2626;}
.card.todo-card{border-left:3px solid #f43f5e;}

.card-body{flex:1;min-width:0;}

.chip-power{background:#dbeafe;color:#1d4ed8;}
.chip-bda{background:#e0e7ff;color:#3730a3;}

.chip-imp{background:#dc2626;color:white;}

.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px;gap:6px;}
.card-meta{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.card-date.red{color:#dc2626;font-weight:600;}
.card-date.amber{color:#d97706;font-weight:600;}
.card-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.15s;}
.card:hover .card-actions{opacity:1;}
.card-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:10px;padding:2px 5px;border-radius:4px;cursor:pointer;}

.promo-badge{font-size:9px;font-weight:700;background:#fef3c7;color:#d97706;padding:1px 5px;border-radius:3px;white-space:nowrap;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:16px;}

.wsp-modal .wsp-tag{display:inline-block;background:#dcfce7;color:#166534;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-bottom:4px;}
.team-view{padding:12px 16px;display:flex;flex-direction:column;gap:14px;}

.team-task-text{flex:1;line-height:1.3;}

.empty-col{color:var(--muted);font-size:11px;font-style:italic;text-align:center;padding:16px 0;}
.filter-row{padding:8px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:white;}
.filter-row select{font-size:11px;border:1px solid var(--border);border-radius:5px;padding:3px 8px;color:var(--text);}

.search-input{font-size:11px;border:1px solid var(--border);border-radius:5px;padding:3px 8px;min-width:120px;}

.quick-add-bar{background:white;border-bottom:2px solid var(--hoy);padding:10px 16px;display:flex;gap:8px;align-items:center;}

<script>
(function() {
  var STORE_KEY = 'forit-kanban-v1';
  var TEAM_KEY = 'forit-team-v1';
  var HOY = (function(){ var d = new Date(); d.setHours(0,0,0,0); return d; })();

  var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function loadData() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { tareas: [] }; } catch(e) { return { tareas: [] }; } }

  var data = loadData();
  var teamData = loadTeam();

  if (data.tareas.length === 0) {
    var ahora0 = new Date().toISOString();
    data.tareas = [
      { id:'seed1', texto:'Subsanar observaciones TAD para Mecenazgo (EX-2026-15509983-GCABA-DGDCC)', col:'hoy', proyecto:'coordi', resp:'vicky', fecha:'2026-06-09', origen:'Gmail ⭐ GCBA 05/06', imp:true, addedDate:ahora0, createdAt:ahora0 },
      { id:'seed2', texto:'ALERTA: revisar presupuesto de JR proyecto BDA Notificaciones (etapa 3)', col:'hoy', proyecto:'bda', resp:'vicky', fecha:'2026-06-08', origen:'Airtable 04/06', imp:true, addedDate:ahora0, createdAt:ahora0 },
      { id:'seed3', texto:'Enviar mail de seguimiento semanal al municipio sobre propuesta impacto social', col:'seguimiento', proyecto:'muni', resp:'vicky', fecha:'', origen:'Consejo Asesor 05/06', imp:false, addedDate:ahora0, createdAt:ahora0 },
      { id:'seed4', texto:'Preparar informe semestral ANPower (con Vic F)', col:'hoy', proyecto:'coordi', resp:'vicky', fecha:'2026-06-12', origen:'Consejo Asesor 05/06', imp:true, addedDate:ahora0, createdAt:ahora0 },
      { id:'seed5', texto:'Contactar grupos de la red BNI para gestionar referidos comerciales', col:'seguimiento', proyecto:'coordi', resp:'vicky', fecha:'2026-06-12', origen:'Consejo Asesor 05/06', imp:false, addedDate:ahora0, createdAt:ahora0 },
      { id:'seed6', texto:'Enviar mail seguimiento a Florencia Bacigalupo (Accenture)', col:'hoy', proyecto:'coordi', resp:'vicky', fecha:'2026-06-08', origen:'Consejo Asesor 05/06', imp:false, addedDate:ahora0, createdAt:ahora0 },
      { id:'seed7', texto:'Programar reunión urgente con cliente ZLO para mostrar avances del sprint', col:'hoy', proyecto:'zlo', resp:'vicky', fecha:'2026-06-08', origen:'Demo ZLO 05/06', imp:true, addedDate:ahora0, createdAt:ahora0 },
      { id:'seed8', texto:'Gestionar con Bruno acceso del equipo Liga al deploy y logs de producción', col:'hoy', proyecto:'liga', resp:'vicky', fecha:'2026-06-08', origen:'Demo Liga cliente 05/06', imp:true, addedDate:ahora0, createdAt:ahora0 },
      { id:'seed9', texto:'Reenviar a Javier el link del entorno de desarrollo de La Liga', col:'hoy', proyecto:'liga', resp:'vicky', fecha:'2026-06-08', origen:'Demo Liga cliente 05/06', imp:false, addedDate:ahora0, createdAt:ahora0 },
      { id:'seed10', texto:'Revisar match de PRs en Airtable (chequeo recurrente de los viernes)', col:'seguimiento', proyecto:'coordi', resp:'vicky', fecha:'2026-06-12', origen:'Recurrente', imp:false, addedDate:ahora0, createdAt:ahora0 },
      { id:'seed11', texto:'Avanzar con Santander — seguimiento propuesta', col:'seguimiento', proyecto:'santander', resp:'vicky', fecha:'', origen:'Pendiente anterior', imp:true, addedDate:new Date('2026-04-29').toISOString(), createdAt:new Date('2026-04-29').toISOString() },
      { id:'seed12', texto:'Coordinar reunión con Bruno y Vic F sobre etapa 3 de Reconocimiento', col:'hoy', proyecto:'power', resp:'vicky', fecha:'2026-06-08', origen:'Daily TL 05/06', imp:false, addedDate:ahora0, createdAt:ahora0 },

  if (teamData.tareas.length === 0) {

    teamData.tareas = [
